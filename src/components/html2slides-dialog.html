    <script>
      var activePane = "paste";
      var fileHtml = null;
      var convertBtn = document.getElementById("convert-button");

      // Re-convert guard: after a successful run the button stays disabled
      // (clicking again would insert a duplicate batch); editing the input
      // or switching tabs re-arms it.
      function lockConvert(label) {
        convertBtn.disabled = true;
        convertBtn.textContent = label || "Convert to Slides";
      }
      function armConvert() {
        convertBtn.disabled = false;
        convertBtn.textContent = "Convert to Slides";
      }
      document.getElementById("html-input").addEventListener("input", armConvert);
      document.getElementById("url-input").addEventListener("input", armConvert);

      document.querySelectorAll(".tab").forEach(function (tab) {
        tab.addEventListener("click", function () {
          document.querySelectorAll(".tab").forEach(function (t) {
            t.classList.remove("active");
          });
          document.querySelectorAll(".pane").forEach(function (p) {
            p.classList.remove("active");
          });
          tab.classList.add("active");
          activePane = tab.getAttribute("data-pane");
          document.getElementById("pane-" + activePane).classList.add("active");
          armConvert();
        });
      });

      // file picking / drag-drop
      var drop = document.getElementById("file-drop");
      var fileInput = document.getElementById("file-input");
      drop.addEventListener("click", function () {
        fileInput.click();
      });
      fileInput.addEventListener("change", function () {
        if (fileInput.files.length) readFile(fileInput.files[0]);
      });
      drop.addEventListener("dragover", function (e) {
        e.preventDefault();
        drop.classList.add("dragover");
      });
      drop.addEventListener("dragleave", function () {
        drop.classList.remove("dragover");
      });
      drop.addEventListener("drop", function (e) {
        e.preventDefault();
        drop.classList.remove("dragover");
        if (e.dataTransfer.files.length) readFile(e.dataTransfer.files[0]);
      });
      function readFile(file) {
        var reader = new FileReader();
        reader.onload = function () {
          fileHtml = reader.result;
          document.getElementById("file-name").textContent =
            file.name + "（" + fileHtml.length + " 字元）";
          armConvert();
        };
        reader.readAsText(file);
      }

      document
        .getElementById("cancel-button")
        .addEventListener("click", function () {
          google.script.host.close();
        });

      document
        .getElementById("convert-button")
        .addEventListener("click", function () {
          var btn = this;
          if (activePane === "paste") {
            var text = document.getElementById("html-input").value.trim();
            if (!text) return showStatus("請先貼上 HTML 內容。", "error");
            runConversion(btn, text);
          } else if (activePane === "file") {
            if (!fileHtml) return showStatus("請先選擇 .html 檔案。", "error");
            runConversion(btn, fileHtml);
          } else {
            var url = document.getElementById("url-input").value.trim();
            if (!url) return showStatus("請輸入網址。", "error");
            btn.classList.add("loading");
            lockConvert("轉換中…");
            showStatus("抓取網頁中…", "info");
            google.script.run
              .withSuccessHandler(function (html) {
                runConversion(btn, html);
              })
              .withFailureHandler(function (err) {
                btn.classList.remove("loading");
                armConvert();
                showStatus("抓取失敗：" + err.message, "error");
              })
              .fetchHtmlFromUrl(url);
          }
        });

      function runConversion(btn, htmlText) {
        var parsed;
        try {
          parsed = parseGslideHtml(htmlText);
        } catch (e) {
          btn.classList.remove("loading");
          armConvert();
          return showStatus("解析失敗：" + e.message, "error");
        }
        if (!parsed.slides.length) {
          btn.classList.remove("loading");
          armConvert();
          return showStatus(
            "找不到任何投影片內容。\n" + parsed.warnings.join("\n"),
            "error",
          );
        }
        btn.classList.add("loading");
        lockConvert("轉換中…");
        showStatus("解析出 " + parsed.slides.length + " 張投影片，建立中…", "info");
        google.script.run
          .withSuccessHandler(function (result) {
            var baseMsg =
              "完成：建立 " + result.created + "/" + result.total + " 張投影片。";
            var warnings = result.warnings || [];
            // minter drawing runs as a SECOND server call: the first
            // execution must end so Apps Script flushes the new pages to
            // the saved document (REST minters can't see unsaved pages).
            if (result.minterJobs && result.minterJobs.length) {
              showStatus(
                baseMsg +
                  "\n繪製 " + result.minterJobs.length + " 個 minter 元件中…",
                "info",
              );
              google.script.run
                .withSuccessHandler(function (second) {
                  finishConversion(btn, baseMsg, warnings.concat(second.warnings || []));
                })
                .withFailureHandler(function (err) {
                  finishConversion(
                    btn,
                    baseMsg,
                    warnings.concat(["minter 第二階段失敗：" + err.message]),
                  );
                })
                .runGslideMinterJobs(JSON.stringify(result.minterJobs));
            } else {
              finishConversion(btn, baseMsg, warnings);
            }
          })
          .withFailureHandler(function (err) {
            btn.classList.remove("loading");
            armConvert();
            showStatus("建立投影片失敗：" + err.message, "error");
          })
          .convertGslideJsonToSlides(JSON.stringify(parsed));
      }

      function finishConversion(btn, baseMsg, warnings) {
        btn.classList.remove("loading");
        lockConvert("已完成 ✓");
        if (warnings.length) {
          showStatus(
            baseMsg +
              "\n（修改內容或切換分頁可再次轉換）" +
              "\n注意事項：\n- " +
              warnings.join("\n- "),
            "info",
          );
        } else {
          showStatus(baseMsg, "success");
          setTimeout(function () {
            google.script.host.close();
          }, 1800);
        }
      }

      function showStatus(message, type) {
        var el = document.getElementById("status-message");
        el.textContent = message;
        el.className = "status-message " + (type || "info");
        el.style.display = "block";
      }
    </script>
  </body>
