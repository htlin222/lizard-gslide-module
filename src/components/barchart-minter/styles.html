<style>
  /* Bar chart minter dialog styles */
  html,
  body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family:
      "Source Sans Pro", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .dialog-root {
    display: flex;
    flex-direction: column;
    height: 100%;
    box-sizing: border-box;
  }

  .cm-body {
    flex: 1;
    min-height: 0;
    overflow: auto;
    padding: 14px 14px 4px;
    box-sizing: border-box;
  }

  .cm-hint {
    margin: 0 0 12px;
    padding: 8px 10px;
    background: #f1f3f4;
    border-radius: 4px;
    font-size: 12px;
    color: #555;
    line-height: 1.4;
  }

  .cm-hint code {
    background: #e2e6e8;
    border-radius: 3px;
    padding: 0 3px;
    font-size: 11px;
  }

  .cm-label {
    display: block;
    margin: 12px 0 6px;
    font-size: 12px;
    font-weight: 600;
    color: #333;
  }

  .cm-textarea {
    width: 100%;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 8px 10px;
    font-family: "Menlo", "Consolas", monospace;
    font-size: 13px;
    box-sizing: border-box;
    min-height: 84px;
    resize: vertical;
  }

  .cm-textarea:focus {
    border-color: #4285f4;
    outline: none;
    box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
  }

  .ai-button {
    width: 100%;
    margin: 8px 0 4px;
    padding: 8px 12px;
    border: 1px solid #6b4fa0;
    border-radius: 4px;
    background: #6b4fa0;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  .ai-button:hover {
    background: #5a3f8c;
  }

  .ai-button:disabled {
    opacity: 0.6;
    cursor: default;
  }

  .cm-toggle-row {
    display: flex;
    gap: 16px;
  }

  .cm-radio,
  .cm-toggle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #333;
    cursor: pointer;
  }

  .cm-toggle {
    margin: 12px 0 0;
  }

  /* Template chips */
  .template-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .template-chips .placeholder {
    color: #999;
    font-style: italic;
    font-size: 12px;
  }

  .tpl-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    border: 1px solid #dadce0;
    border-radius: 14px;
    background: #fff;
    font-size: 12px;
    color: #3c4043;
    cursor: pointer;
    transition:
      border-color 0.12s ease,
      box-shadow 0.12s ease;
  }

  .tpl-chip:hover {
    border-color: #c6c9cc;
  }

  .tpl-chip.active {
    border-color: #4285f4;
    box-shadow: 0 0 0 1px #4285f4 inset;
    font-weight: 600;
  }

  .tpl-chip .swatch {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Bar chart preview */
  .bar-preview {
    min-height: 120px;
    border: 1px dashed #ccc;
    border-radius: 4px;
    padding: 12px;
    background: #fff;
  }

  .bar-preview .placeholder {
    color: #999;
    font-style: italic;
    font-size: 12px;
  }

  /* Vertical layout */
  .bp-vert {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    height: 150px;
    border-bottom: 1.5px solid #999;
    padding-bottom: 0;
  }

  .bp-vcol {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    height: 100%;
    min-width: 0;
  }

  .bp-vbar {
    width: 60%;
    min-height: 1px;
    border-radius: 2px 2px 0 0;
  }

  .bp-vval {
    font-size: 10px;
    color: #333;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .bp-vlabel {
    font-size: 10px;
    color: #555;
    margin-top: 3px;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 100%;
  }

  /* Horizontal layout */
  .bp-horiz {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .bp-hrow {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .bp-hlabel {
    width: 64px;
    flex-shrink: 0;
    font-size: 10px;
    color: #555;
    text-align: right;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .bp-htrack {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 4px;
    border-left: 1.5px solid #999;
    padding-left: 0;
    min-width: 0;
  }

  .bp-hbar {
    height: 14px;
    min-width: 1px;
    border-radius: 0 2px 2px 0;
  }

  .bp-hval {
    font-size: 10px;
    color: #333;
    font-weight: 600;
    flex-shrink: 0;
  }

  /* Status + buttons */
  .status-message {
    margin: 0 14px;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 12px;
    display: none;
    flex-shrink: 0;
  }

  .status-success {
    background-color: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
  }

  .status-error {
    background-color: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
  }

  .status-info {
    background-color: #d1ecf1;
    color: #0c5460;
    border: 1px solid #bee5eb;
  }

  .button-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 14px;
    background: white;
    border-top: 1px solid #eee;
    flex-shrink: 0;
  }

  .button-row button {
    font-family: inherit;
    font-size: 14px;
    line-height: 1;
    padding: 10px 18px;
    border-radius: 6px;
    border: 1px solid transparent;
    cursor: pointer;
    transition:
      background-color 0.12s ease,
      border-color 0.12s ease;
  }

  .clear-button {
    background-color: #fff;
    color: #3c4043;
    border: 1px solid #dadce0;
  }

  .clear-button:hover {
    background-color: #f1f3f4;
    border-color: #c6c9cc;
  }

  .primary-button {
    flex: 1;
    background-color: #3d6869;
    color: #fff;
  }

  .primary-button:hover {
    background-color: #335a5b;
  }

  .primary-button:disabled {
    background-color: #b9c7c7;
    cursor: default;
  }
</style>
