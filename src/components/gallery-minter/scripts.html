<script>
  /** Templates fetched from the server (with resolved colors). */
  var TEMPLATES = [];
  /** Currently selected template id. */
  var selectedId = null;

  /**
   * Shows a status message in the dialog.
   * @param {string} message
   * @param {string} type - 'success' | 'error' | 'info' | 'warning'
   */
  function showStatus(message, type) {
    type = type || "info";
    var el = document.getElementById("statusMessage");
    el.textContent = message;
    el.className = "status-message status-" + type;
    el.style.display = "block";
    if (type === "success" || type === "info") {
      setTimeout(function () {
        el.style.display = "none";
      }, 5000);
    }
  }

  /** @param {string} s @return {string} */
  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  /** @return {Object|null} the selected template */
  function currentTemplate() {
    for (var i = 0; i < TEMPLATES.length; i++) {
      if (TEMPLATES[i].id === selectedId) return TEMPLATES[i];
    }
    return null;
  }

  /**
   * Parses the textarea into {url, caption} items. One image per line, with an
   * optional "| caption" suffix. Blank lines and lines without a URL are dropped.
   * @return {Array<{url: string, caption: string}>}
   */
  function parseItems() {
    var raw = document.getElementById("itemsInput").value || "";
    var lines = raw.split(/\r?\n/);
    var items = [];
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (!line) continue;
      var idx = line.indexOf("|");
      var url, caption;
      if (idx >= 0) {
        url = line.slice(0, idx).trim();
        caption = line.slice(idx + 1).trim();
      } else {
        url = line;
        caption = "";
      }
      if (url) items.push({ url: url, caption: caption });
    }
    return items;
  }

  /** @return {number} user column count, or 0 for auto. */
  function colsValue() {
    var v = parseInt(document.getElementById("colsInput").value, 10);
    return v > 0 ? v : 0;
  }

  /** @return {boolean} whether captions are enabled. */
  function captionsOn() {
    return document.getElementById("captionsToggle").checked;
  }

  /**
   * Suggests a column count for n images (mirrors server suggestGalleryCols_).
   * @param {number} n
   * @return {number}
   */
  function suggestCols(n) {
    if (n <= 0) return 1;
    if (n === 1) return 1;
    if (n === 2) return 2;
    if (n <= 4) return 2;
    if (n <= 6) return 3;
    if (n <= 9) return 3;
    return 4;
  }

  /** Renders the clickable template chips. */
  function renderChips() {
    var wrap = document.getElementById("templateChips");
    wrap.innerHTML = "";
    TEMPLATES.forEach(function (t) {
      var chip = document.createElement("button");
      chip.type = "button";
      chip.className = "tpl-chip" + (t.id === selectedId ? " active" : "");
      chip.innerHTML =
        '<span class="swatch" style="background:' +
        t.swatch +
        '"></span>' +
        escapeHtml(t.name);
      chip.onclick = function () {
        selectTemplate(t.id);
      };
      wrap.appendChild(chip);
    });
  }

  /**
   * Selects a template and refreshes chips + preview.
   * @param {string} id
   */
  function selectTemplate(id) {
    selectedId = id;
    renderChips();
    updatePreview();
  }

  /** Re-renders the live CSS-grid preview of the gallery. */
  function updatePreview() {
    var preview = document.getElementById("galleryPreview");
    var items = parseItems();
    var t = currentTemplate();

    if (!items.length) {
      preview.style.gridTemplateColumns = "";
      preview.innerHTML =
        '<span class="placeholder">預覽會顯示在這裡…</span>';
      return;
    }

    var cols = colsValue() || suggestCols(items.length);
    preview.style.gridTemplateColumns = "repeat(" + cols + ", 1fr)";

    var showCaptions = captionsOn();
    var borderStyle = "";
    if (t && t.border && t.borderWidth > 0) {
      borderStyle =
        "border:" + t.borderWidth + "px solid " + t.borderColor + ";";
    }
    var captionColor = (t && t.captionColor) || "#333333";

    var html = "";
    items.forEach(function (item) {
      var cap =
        showCaptions && item.caption
          ? '<div class="gp-caption" style="color:' +
            captionColor +
            '">' +
            escapeHtml(item.caption) +
            "</div>"
          : "";
      // onerror swaps the <img> for a graceful broken-image placeholder.
      var img =
        '<img class="gp-thumb" style="' +
        borderStyle +
        '" src="' +
        escapeHtml(item.url) +
        '" alt="" ' +
        "onerror=\"this.outerHTML='" +
        '<div class=&quot;gp-thumb gp-broken&quot; style=&quot;' +
        borderStyle.replace(/"/g, "&quot;") +
        "&quot;>🖼</div>'\" />";
      html += '<div class="gp-cell">' + img + cap + "</div>";
    });
    preview.innerHTML = html;
  }

  /** Clears the image list (keeps template + options). */
  function clearForm() {
    document.getElementById("itemsInput").value = "";
    document.getElementById("statusMessage").style.display = "none";
    updatePreview();
  }

  /** Inserts the gallery via the server. */
  function insertGallery() {
    var t = currentTemplate();
    if (!t) {
      showStatus("Pick a template first.", "error");
      return;
    }
    var items = parseItems();
    if (!items.length) {
      showStatus("請至少輸入一張圖片網址。", "error");
      return;
    }

    var btn = document.getElementById("insertButton");
    var label = btn.textContent;
    btn.disabled = true;
    btn.textContent = "Working…";
    showStatus("🖼 Inserting gallery…", "info");

    google.script.run
      .withSuccessHandler(function (res) {
        btn.disabled = false;
        btn.textContent = label;
        if (res && res.success) {
          var warnings = (res && res.warnings) || [];
          if (warnings.length) {
            // Keep the dialog open and surface the failures.
            showStatus(
              "⚠️ 已插入，但有 " +
                warnings.length +
                " 張圖片載入失敗：\n" +
                warnings.join("\n"),
              "warning",
            );
          } else {
            google.script.host.close();
          }
        } else {
          showStatus("❌ " + ((res && res.error) || "Insert failed."), "error");
        }
      })
      .withFailureHandler(function (err) {
        btn.disabled = false;
        btn.textContent = label;
        showStatus("❌ " + (err.message || "Insert error"), "error");
      })
      .insertGalleryIntoSlide({
        items: items,
        cols: colsValue(),
        templateId: selectedId,
        captions: captionsOn(),
      });
  }

  document.addEventListener("DOMContentLoaded", function () {
    document
      .getElementById("itemsInput")
      .addEventListener("input", updatePreview);
    document
      .getElementById("colsInput")
      .addEventListener("input", updatePreview);
    document
      .getElementById("captionsToggle")
      .addEventListener("change", updatePreview);

    google.script.run
      .withSuccessHandler(function (templates) {
        TEMPLATES = templates || [];
        if (TEMPLATES.length) selectTemplate(TEMPLATES[0].id);
      })
      .withFailureHandler(function (err) {
        showStatus(
          "❌ Could not load templates: " + (err.message || ""),
          "error",
        );
      })
      .getGalleryTemplates();

    showStatus(
      "💡 每行一張圖：網址 | 說明。網址需公開可存取。",
      "info",
    );
  });
</script>
