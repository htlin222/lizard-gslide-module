<script>
  /** Templates fetched from the server (with resolved colors). */
  var TEMPLATES = [];
  /** Currently selected template id. */
  var selectedId = null;
  /** Currently selected orientation: 'horizontal' | 'vertical'. */
  var orientation = "horizontal";

  /**
   * Shows a status message in the dialog.
   * @param {string} message
   * @param {string} type - 'success' | 'error' | 'info'
   */
  function showStatus(message, type) {
    type = type || "info";
    var el = document.getElementById("statusMessage");
    el.textContent = message;
    el.className = "status-message status-" + type;
    el.style.display = "block";
    if (type === "success" || type === "info") {
      setTimeout(function () {
        el.style.display = "none";
      }, 5000);
    }
  }

  /**
   * Toggles between the structured-input ("syntax") and AI Context tabs.
   * @param {string} name - 'syntax' | 'context'
   */
  function switchInputTab(name) {
    var tabs = document.querySelectorAll(".input-tab");
    for (var i = 0; i < tabs.length; i++) {
      if (tabs[i].getAttribute("data-tab") === name) {
        tabs[i].classList.add("active");
      } else {
        tabs[i].classList.remove("active");
      }
    }
    document.getElementById("panel-syntax").hidden = name !== "syntax";
    document.getElementById("panel-context").hidden = name !== "context";
  }

  /** @param {string} s @return {string} */
  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  /** @return {Object|null} the selected template */
  function currentTemplate() {
    for (var i = 0; i < TEMPLATES.length; i++) {
      if (TEMPLATES[i].id === selectedId) return TEMPLATES[i];
    }
    return null;
  }

  /**
   * Parses the milestones textarea into an array of {date, label}.
   * One milestone per line, "date | label". Lines with no "|" become the label.
   * @return {Array<{date:string,label:string}>}
   */
  function parseMilestones() {
    var raw = document.getElementById("milestonesInput").value || "";
    var lines = raw.replace(/\r\n/g, "\n").split("\n");
    var items = [];
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (!line) continue;
      var date = "";
      var label = "";
      var idx = line.indexOf("|");
      if (idx >= 0) {
        date = line.slice(0, idx).trim();
        label = line.slice(idx + 1).trim();
      } else {
        label = line;
      }
      if (date || label) items.push({ date: date, label: label });
    }
    return items;
  }

  /** Renders the clickable template chips. */
  function renderChips() {
    var wrap = document.getElementById("templateChips");
    wrap.innerHTML = "";
    TEMPLATES.forEach(function (t) {
      var chip = document.createElement("button");
      chip.type = "button";
      chip.className = "tpl-chip" + (t.id === selectedId ? " active" : "");
      chip.innerHTML =
        '<span class="swatch" style="background:' +
        t.lineColor +
        '"></span>' +
        escapeHtml(t.name);
      chip.onclick = function () {
        selectTemplate(t.id);
      };
      wrap.appendChild(chip);
    });
  }

  /**
   * Selects a template and refreshes chips + preview.
   * @param {string} id
   */
  function selectTemplate(id) {
    selectedId = id;
    renderChips();
    updatePreview();
  }

  /** Renders the orientation toggle active state. */
  function renderOrient() {
    var btns = document.querySelectorAll(".orient-btn");
    for (var i = 0; i < btns.length; i++) {
      if (btns[i].getAttribute("data-orient") === orientation) {
        btns[i].classList.add("active");
      } else {
        btns[i].classList.remove("active");
      }
    }
  }

  /** Re-renders the live HTML preview of the timeline. */
  function updatePreview() {
    var preview = document.getElementById("timelinePreview");
    var t = currentTemplate();
    var items = parseMilestones();
    if (!t || !items.length) {
      preview.innerHTML =
        '<span class="placeholder">輸入里程碑並選範本後，預覽會顯示在這裡…</span>';
      return;
    }

    var dotStyle =
      t.nodeStyle === "outlined"
        ? "background:" + t.nodeFill + ";border:2px solid " + t.nodeBorder
        : "background:" + t.nodeFill + ";border:2px solid " + t.nodeBorder;

    if (orientation === "horizontal") {
      var nodes = "";
      for (var i = 0; i < items.length; i++) {
        var above = i % 2 === 0;
        var dateHtml = items[i].date
          ? '<div class="tp-date" style="color:' +
            t.dateColor +
            '">' +
            escapeHtml(items[i].date) +
            "</div>"
          : "";
        var labelHtml = items[i].label
          ? '<div class="tp-label" style="color:' +
            t.labelColor +
            '">' +
            escapeHtml(items[i].label) +
            "</div>"
          : "";
        var stackCls = above ? "tp-above" : "tp-below";
        nodes +=
          '<div class="tp-node">' +
          '<div class="' +
          stackCls +
          '">' +
          dateHtml +
          labelHtml +
          "</div>" +
          '<div class="tp-dot" style="' +
          dotStyle +
          '"></div>' +
          "</div>";
      }
      preview.innerHTML =
        '<div class="tp-h">' +
        '<div class="tp-line" style="background:' +
        t.lineColor +
        '"></div>' +
        '<div class="tp-nodes">' +
        nodes +
        "</div>" +
        "</div>";
    } else {
      var rows = "";
      for (var j = 0; j < items.length; j++) {
        var vdate = items[j].date
          ? '<div class="tp-vdate" style="color:' +
            t.dateColor +
            '">' +
            escapeHtml(items[j].date) +
            "</div>"
          : "";
        var vlabel = items[j].label
          ? '<div class="tp-vlabel" style="color:' +
            t.labelColor +
            '">' +
            escapeHtml(items[j].label) +
            "</div>"
          : "";
        rows +=
          '<div class="tp-row">' +
          vdate +
          '<div class="tp-dot" style="' +
          dotStyle +
          '"></div>' +
          vlabel +
          "</div>";
      }
      preview.innerHTML =
        '<div class="tp-v">' +
        '<div class="tp-line" style="background:' +
        t.lineColor +
        '"></div>' +
        rows +
        "</div>";
    }
  }

  /**
   * Strips code-fence markers so the milestone parser sees clean lines even
   * when an LLM wraps the output in ```.
   * @param {string} text
   * @return {string}
   */
  function cleanMilestones(text) {
    return (text || "")
      .split(/\r?\n/)
      .filter(function (l) {
        return !/^```/.test(l.trim());
      })
      .join("\n")
      .trim();
  }

  /**
   * Sends the Context textarea text to Groq, then writes the resulting
   * milestone lines into the milestones input and refreshes the preview.
   */
  function generateFromContext() {
    var ctx = (document.getElementById("contextInput").value || "").trim();
    if (!ctx) {
      showStatus("先在上方貼上一段內容。", "error");
      return;
    }
    var btn = document.getElementById("generateButton");
    btn.disabled = true;
    btn.textContent = "Generating…";
    showStatus("🤖 Generating timeline with AI…", "info");

    google.script.run
      .withSuccessHandler(function (res) {
        btn.disabled = false;
        btn.textContent = "✨ Generate with AI";
        if (res && res.needKey) {
          showStatus(res.error, "error");
          return;
        }
        if (!res || !res.success) {
          showStatus(
            "❌ " + ((res && res.error) || "AI generation failed."),
            "error",
          );
          return;
        }
        var md = cleanMilestones(res.generatedText || "");
        if (!md) {
          showStatus(
            "❌ AI returned no milestones. Try rephrasing the context.",
            "error",
          );
          return;
        }
        document.getElementById("milestonesInput").value = md;
        updatePreview();
        switchInputTab("syntax");
        showStatus(
          "✅ 時間軸已生成 — 檢查後即可 Insert。",
          "success",
        );
      })
      .withFailureHandler(function (err) {
        btn.disabled = false;
        btn.textContent = "✨ Generate with AI";
        showStatus("❌ " + (err.message || "AI error"), "error");
      })
      .generateTimelineFromContext(ctx);
  }

  /** Clears the milestones (keeps the selected template + orientation). */
  function clearForm() {
    document.getElementById("milestonesInput").value = "";
    document.getElementById("statusMessage").style.display = "none";
    updatePreview();
  }

  /** Inserts the timeline via the server. */
  function insertTimeline() {
    var t = currentTemplate();
    if (!t) {
      showStatus("Pick a template first.", "error");
      return;
    }
    var items = parseMilestones();
    if (!items.length) {
      showStatus("請至少輸入一個里程碑。", "error");
      return;
    }
    var btn = document.getElementById("insertButton");
    var label = btn.textContent;
    btn.disabled = true;
    btn.textContent = "Working…";
    showStatus("📌 Inserting timeline…", "info");

    google.script.run
      .withSuccessHandler(function (res) {
        btn.disabled = false;
        btn.textContent = label;
        if (res && res.success) {
          google.script.host.close();
        } else {
          showStatus("❌ " + ((res && res.error) || "Insert failed."), "error");
        }
      })
      .withFailureHandler(function (err) {
        btn.disabled = false;
        btn.textContent = label;
        showStatus("❌ " + (err.message || "Insert error"), "error");
      })
      .insertTimelineIntoSlide({
        items: items,
        templateId: selectedId,
        orientation: orientation,
      });
  }

  document.addEventListener("DOMContentLoaded", function () {
    document
      .getElementById("milestonesInput")
      .addEventListener("input", updatePreview);

    var btns = document.querySelectorAll(".orient-btn");
    for (var i = 0; i < btns.length; i++) {
      btns[i].addEventListener("click", function () {
        orientation = this.getAttribute("data-orient") || "horizontal";
        renderOrient();
        updatePreview();
      });
    }

    var __pre = window.__MINTER_PRELOAD__ || {};
    if (__pre.templates && __pre.templates.length) {
      TEMPLATES = __pre.templates;
      selectTemplate(TEMPLATES[0].id);
    } else {
      google.script.run
        .withSuccessHandler(function (templates) {
          TEMPLATES = templates || [];
          if (TEMPLATES.length) selectTemplate(TEMPLATES[0].id);
        })
        .withFailureHandler(function (err) {
          showStatus("❌ Could not load templates: " + (err.message || ""), "error");
        })
        .getTimelineTemplates();
    }

    renderOrient();
    showStatus("💡 每行一個里程碑（date | label）→ 選方向與範本 → Insert。", "info");
  });
</script>
