<style>
  /* Timeline minter dialog styles */
  html,
  body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family:
      "Source Sans Pro", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .dialog-root {
    display: flex;
    flex-direction: column;
    height: 100%;
    box-sizing: border-box;
  }

  .cm-body {
    flex: 1;
    min-height: 0;
    overflow: auto;
    padding: 14px 14px 4px;
    box-sizing: border-box;
  }

  .input-tabs {
    display: flex;
    gap: 4px;
    margin: 4px 0 8px;
  }

  .input-tab {
    padding: 5px 12px;
    border: 1px solid #dadce0;
    border-radius: 6px 6px 0 0;
    background: #f8f9fa;
    font-family: inherit;
    font-size: 12px;
    color: #666;
    cursor: pointer;
  }

  .input-tab.active {
    background: #fff;
    color: #1a73e8;
    border-bottom-color: #fff;
    font-weight: 600;
  }

  .input-panel[hidden] {
    display: none;
  }

  .cm-hint {
    margin: 0 0 12px;
    padding: 8px 10px;
    background: #f1f3f4;
    border-radius: 4px;
    font-size: 12px;
    color: #555;
    line-height: 1.5;
  }

  .cm-hint code {
    background: #e3e6e8;
    border-radius: 3px;
    padding: 1px 4px;
    font-size: 11px;
  }

  .cm-label {
    display: block;
    margin: 12px 0 6px;
    font-size: 12px;
    font-weight: 600;
    color: #333;
  }

  .cm-textarea {
    width: 100%;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 8px 10px;
    font-family: inherit;
    font-size: 13px;
    box-sizing: border-box;
    min-height: 96px;
    resize: vertical;
  }

  .cm-textarea:focus {
    border-color: #4285f4;
    outline: none;
    box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
  }

  /* Orientation toggle */
  .orient-toggle {
    display: flex;
    gap: 6px;
  }

  .orient-btn {
    flex: 1;
    padding: 7px 10px;
    border: 1px solid #dadce0;
    border-radius: 6px;
    background: #fff;
    font-family: inherit;
    font-size: 12px;
    color: #3c4043;
    cursor: pointer;
    transition:
      border-color 0.12s ease,
      box-shadow 0.12s ease;
  }

  .orient-btn:hover {
    border-color: #c6c9cc;
  }

  .orient-btn.active {
    border-color: #4285f4;
    box-shadow: 0 0 0 1px #4285f4 inset;
    font-weight: 600;
  }

  /* Template chips */
  .template-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .template-chips .placeholder {
    color: #999;
    font-style: italic;
    font-size: 12px;
  }

  .tpl-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    border: 1px solid #dadce0;
    border-radius: 14px;
    background: #fff;
    font-size: 12px;
    color: #3c4043;
    cursor: pointer;
    transition:
      border-color 0.12s ease,
      box-shadow 0.12s ease;
  }

  .tpl-chip:hover {
    border-color: #c6c9cc;
  }

  .tpl-chip.active {
    border-color: #4285f4;
    box-shadow: 0 0 0 1px #4285f4 inset;
    font-weight: 600;
  }

  .tpl-chip .swatch {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Timeline preview */
  .timeline-preview {
    min-height: 90px;
    border: 1px dashed #ccc;
    border-radius: 4px;
    padding: 16px 14px;
    background: #fff;
    overflow: auto;
  }

  .timeline-preview .placeholder {
    color: #999;
    font-style: italic;
    font-size: 12px;
  }

  /* Horizontal preview */
  .tp-h {
    position: relative;
    display: flex;
    align-items: center;
    min-height: 70px;
  }

  .tp-h .tp-line {
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    height: 3px;
    transform: translateY(-50%);
  }

  .tp-h .tp-nodes {
    position: relative;
    display: flex;
    justify-content: space-between;
    width: 100%;
    z-index: 1;
  }

  .tp-h .tp-node {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
  }

  .tp-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    box-sizing: border-box;
  }

  .tp-date {
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
    margin: 2px 0;
  }

  .tp-label {
    font-size: 10px;
    white-space: nowrap;
    margin: 2px 0;
  }

  .tp-h .tp-above {
    position: absolute;
    bottom: 18px;
    text-align: center;
  }

  .tp-h .tp-below {
    position: absolute;
    top: 18px;
    text-align: center;
  }

  /* Vertical preview */
  .tp-v {
    position: relative;
    padding-left: 80px;
  }

  .tp-v .tp-line {
    position: absolute;
    left: 76px;
    top: 6px;
    bottom: 6px;
    width: 3px;
  }

  .tp-v .tp-row {
    position: relative;
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 10px 0;
  }

  .tp-v .tp-row .tp-dot {
    position: absolute;
    left: -10px;
    z-index: 1;
  }

  .tp-v .tp-vdate {
    position: absolute;
    left: -80px;
    width: 70px;
    text-align: right;
    font-size: 11px;
    font-weight: 700;
  }

  .tp-v .tp-vlabel {
    font-size: 12px;
  }

  /* Status + buttons */
  .status-message {
    margin: 0 14px;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 12px;
    display: none;
    flex-shrink: 0;
  }

  .status-success {
    background-color: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
  }

  .status-error {
    background-color: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
  }

  .status-info {
    background-color: #d1ecf1;
    color: #0c5460;
    border: 1px solid #bee5eb;
  }

  .button-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 14px;
    background: white;
    border-top: 1px solid #eee;
    flex-shrink: 0;
  }

  .button-row button {
    font-family: inherit;
    font-size: 14px;
    line-height: 1;
    padding: 10px 18px;
    border-radius: 6px;
    border: 1px solid transparent;
    cursor: pointer;
    transition:
      background-color 0.12s ease,
      border-color 0.12s ease;
  }

  .clear-button {
    background-color: #fff;
    color: #3c4043;
    border: 1px solid #dadce0;
  }

  .clear-button:hover {
    background-color: #f1f3f4;
    border-color: #c6c9cc;
  }

  .primary-button {
    flex: 1;
    background-color: #3d6869;
    color: #fff;
  }

  .primary-button:hover {
    background-color: #335a5b;
  }

  .primary-button:disabled {
    background-color: #b9c7c7;
    cursor: default;
  }

  .ai-button {
    display: block;
    width: 100%;
    margin: 8px 0 4px;
    padding: 8px 12px;
    font-size: 13px;
    font-weight: 500;
    color: #fff;
    background-color: #6b4ea3;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  .ai-button:hover {
    background-color: #5c4290;
  }

  .ai-button:disabled {
    background-color: #b6acce;
    cursor: default;
  }
</style>
