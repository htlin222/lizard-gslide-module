<script>
  /** Templates fetched from the server (with resolved colors). */
  var TEMPLATES = [];
  /** Currently selected template id. */
  var selectedId = null;
  /** True once the user edits the header, so we stop auto-filling it. */
  var headerTouched = false;

  /**
   * Shows a status message in the dialog.
   * @param {string} message
   * @param {string} type - 'success' | 'error' | 'info'
   */
  function showStatus(message, type = "info") {
    const el = document.getElementById("statusMessage");
    el.textContent = message;
    el.className = `status-message status-${type}`;
    el.style.display = "block";
    if (type === "success" || type === "info") {
      setTimeout(() => {
        el.style.display = "none";
      }, 5000);
    }
  }

  /** @param {string} s @return {string} */
  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  /** @return {Object|null} the selected template */
  function currentTemplate() {
    for (const t of TEMPLATES) if (t.id === selectedId) return t;
    return null;
  }

  /** Renders the clickable template chips. */
  function renderChips() {
    const wrap = document.getElementById("templateChips");
    wrap.innerHTML = "";
    TEMPLATES.forEach((t) => {
      const chip = document.createElement("button");
      chip.type = "button";
      chip.className = "tpl-chip" + (t.id === selectedId ? " active" : "");
      chip.innerHTML =
        '<span class="swatch" style="background:' +
        t.barColor +
        '"></span>' +
        escapeHtml(t.name);
      chip.onclick = () => selectTemplate(t.id);
      wrap.appendChild(chip);
    });
  }

  /**
   * Selects a template, auto-fills the header default (unless the user edited
   * it), and refreshes chips + preview.
   * @param {string} id
   */
  function selectTemplate(id) {
    selectedId = id;
    const t = currentTemplate();
    if (t && !headerTouched) {
      document.getElementById("headerInput").value = t.headerLabel || "";
    }
    renderChips();
    updatePreview();
  }

  /** Re-renders the live HTML preview of the callout. */
  function updatePreview() {
    const preview = document.getElementById("calloutPreview");
    const t = currentTemplate();
    if (!t) {
      preview.innerHTML = '<span class="placeholder">預覽會顯示在這裡…</span>';
      return;
    }
    const header = document.getElementById("headerInput").value.trim();
    const body =
      document.getElementById("bodyInput").value.trim() || "Your text here…";

    let inner;
    if (t.style === "quote" || !header) {
      // Left bar + body only (no header banner).
      inner =
        '<div class="cp-bar" style="background:' +
        t.barColor +
        '"></div>' +
        '<div class="cp-body cp-quote" style="background:' +
        t.bodyFill +
        ";color:" +
        t.bodyText +
        ";border-color:" +
        t.bodyBorder +
        '">' +
        escapeHtml(body) +
        "</div>";
    } else {
      inner =
        '<div class="cp-bar" style="background:' +
        t.barColor +
        '"></div>' +
        '<div class="cp-content">' +
        '<div class="cp-header" style="background:' +
        t.headerFill +
        ";color:" +
        t.headerText +
        ";border-color:" +
        t.bodyBorder +
        '">' +
        escapeHtml(header) +
        "</div>" +
        '<div class="cp-body" style="background:' +
        t.bodyFill +
        ";color:" +
        t.bodyText +
        ";border-color:" +
        t.bodyBorder +
        '">' +
        escapeHtml(body) +
        "</div>" +
        "</div>";
    }
    preview.innerHTML = '<div class="cp-wrap">' + inner + "</div>";
  }

  /**
   * Strips code-fence markers so the AI parser sees clean text even when an LLM
   * wraps its reply in ```.
   * @param {string} text
   * @return {string}
   */
  function cleanAiText(text) {
    return (text || "")
      .split(/\r?\n/)
      .filter((l) => !/^```/.test(l.trim()))
      .join("\n")
      .trim();
  }

  /**
   * Sends the Context textarea to Groq, then fills the Header input and Body
   * textarea from the two-line "HEADER: …" / "BODY: …" reply. Tolerant: if the
   * format isn't followed, the first line becomes the header and the rest the
   * body. Refreshes the preview afterward.
   */
  function generateFromContext() {
    const ctx = document.getElementById("contextInput").value.trim();
    if (!ctx) {
      showStatus("先在上方貼上一段內容。", "error");
      return;
    }
    const btn = document.getElementById("generateButton");
    btn.disabled = true;
    btn.textContent = "Generating…";
    showStatus("🤖 AI 產生標注中…", "info");

    google.script.run
      .withSuccessHandler(function (res) {
        btn.disabled = false;
        btn.textContent = "✨ Generate with AI";
        if (res && res.needKey) {
          showStatus(res.error, "error");
          return;
        }
        if (!res || !res.success) {
          showStatus(
            "❌ " + ((res && res.error) || "AI generation failed."),
            "error",
          );
          return;
        }
        const text = cleanAiText(res.generatedText || "");
        if (!text) {
          showStatus("❌ AI returned nothing. Try rephrasing the context.", "error");
          return;
        }
        const lines = text.split(/\r?\n/).filter((l) => l.trim().length);
        let header = "";
        let body = "";
        for (const line of lines) {
          const h = line.match(/^\s*HEADER:\s*(.*)$/i);
          const b = line.match(/^\s*BODY:\s*(.*)$/i);
          if (h && !header) {
            header = h[1].trim();
          } else if (b && !body) {
            body = b[1].trim();
          } else if (header && !b && !h) {
            body = (body ? body + " " : "") + line.trim();
          }
        }
        // Tolerant fallback: format not followed → first line = header, rest = body.
        if (!header && !body) {
          header = (lines[0] || "").trim();
          body = lines.slice(1).join(" ").trim();
        }
        if (header) {
          headerTouched = true;
          document.getElementById("headerInput").value = header;
        }
        if (body) {
          document.getElementById("bodyInput").value = body;
        }
        updatePreview();
        showStatus("✅ 已產生標注 — 檢查後即可 Insert。", "success");
      })
      .withFailureHandler(function (err) {
        btn.disabled = false;
        btn.textContent = "✨ Generate with AI";
        showStatus("❌ " + (err.message || "AI error"), "error");
      })
      .generateCalloutFromContext(ctx);
  }

  /** Clears header + body (keeps the selected template). */
  function clearForm() {
    headerTouched = false;
    document.getElementById("bodyInput").value = "";
    const t = currentTemplate();
    document.getElementById("headerInput").value = (t && t.headerLabel) || "";
    document.getElementById("statusMessage").style.display = "none";
    updatePreview();
  }

  /** Inserts (or converts the selection into) the callout via the server. */
  function insertCallout() {
    const t = currentTemplate();
    if (!t) {
      showStatus("Pick a template first.", "error");
      return;
    }
    const btn = document.getElementById("insertButton");
    const label = btn.textContent;
    btn.disabled = true;
    btn.textContent = "Working…";
    showStatus("📌 Inserting callout…", "info");

    google.script.run
      .withSuccessHandler(function (res) {
        btn.disabled = false;
        btn.textContent = label;
        if (res && res.success) {
          google.script.host.close();
        } else {
          showStatus("❌ " + ((res && res.error) || "Insert failed."), "error");
        }
      })
      .withFailureHandler(function (err) {
        btn.disabled = false;
        btn.textContent = label;
        showStatus("❌ " + (err.message || "Insert error"), "error");
      })
      .insertCalloutIntoSlide({
        templateId: selectedId,
        header: document.getElementById("headerInput").value,
        body: document.getElementById("bodyInput").value,
      });
  }

  document.addEventListener("DOMContentLoaded", function () {
    document.getElementById("headerInput").addEventListener("input", function () {
      headerTouched = true;
      updatePreview();
    });
    document
      .getElementById("bodyInput")
      .addEventListener("input", updatePreview);

    google.script.run
      .withSuccessHandler(function (templates) {
        TEMPLATES = templates || [];
        if (TEMPLATES.length) selectTemplate(TEMPLATES[0].id);
      })
      .withFailureHandler(function (err) {
        showStatus("❌ Could not load templates: " + (err.message || ""), "error");
      })
      .getCalloutTemplates();

    showStatus("💡 選範本 → 填內容 → Insert（有選 shape 就會轉換它）。", "info");
  });
</script>
