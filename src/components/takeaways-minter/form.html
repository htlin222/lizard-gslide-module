<div class="dialog-root">
  <div class="cm-body">
    <p class="cm-hint">
      填標題與重點（每行一條，格式 <code>標題 | 說明</code>，說明可省略）→ 選範本 →
      Insert，會在目前投影片插入「重點摘要」區塊。
    </p>

    <div class="input-tabs">
      <button type="button" class="input-tab active" data-tab="syntax" onclick="switchInputTab('syntax')">內容</button>
      <button type="button" class="input-tab" data-tab="context" onclick="switchInputTab('context')">✨ Context</button>
    </div>

    <div class="input-panel" id="panel-syntax">
      <label class="cm-label" for="headingInput">標題 Heading</label>
      <input
        type="text"
        id="headingInput"
        class="cm-input"
        placeholder="Key Takeaways / 重點摘要"
      />

      <label class="cm-label" for="pointsInput"
        >重點 Points（每行一條：標題 | 說明）</label
      >
      <textarea
        id="pointsInput"
        class="cm-textarea"
        placeholder="第一個重點 | 簡短說明&#10;第二個重點&#10;第三個重點 | 另一段說明"
      ></textarea>
    </div>

    <div class="input-panel" id="panel-context" hidden>
      <label class="cm-label" for="contextInput"
        >貼上內容 → AI 轉成重點（選填）</label
      >
      <textarea
        id="contextInput"
        class="cm-textarea"
        placeholder="貼上一段內容，AI 萃取重點…"
      ></textarea>
      <button
        type="button"
        class="ai-button"
        id="generateButton"
        onclick="generateFromContext()"
      >
        ✨ Generate with AI
      </button>
    </div>

    <label class="cm-label">範本 Template</label>
    <div class="template-chips" id="templateChips">
      <span class="placeholder">Loading templates…</span>
    </div>

    <label class="cm-label">預覽 Preview</label>
    <div class="takeaways-preview" id="takeawaysPreview">
      <span class="placeholder">預覽會顯示在這裡…</span>
    </div>
  </div>

  <div class="status-message" id="statusMessage"></div>

  <div class="button-row">
    <button type="button" class="clear-button" onclick="clearForm()">Clear</button>
    <button
      type="button"
      class="primary-button"
      id="insertButton"
      onclick="insertTakeaways()"
    >
      📌 Insert
    </button>
  </div>
</div>
