<script>
  /** Templates fetched from the server (with resolved colors). */
  var TEMPLATES = [];
  /** Currently selected template id. */
  var selectedId = null;
  /** Default heading shown when the user hasn't typed one. */
  var DEFAULT_HEADING = "Key Takeaways";

  /**
   * Shows a status message in the dialog.
   * @param {string} message
   * @param {string} type - 'success' | 'error' | 'info'
   */
  function showStatus(message, type) {
    type = type || "info";
    var el = document.getElementById("statusMessage");
    el.textContent = message;
    el.className = "status-message status-" + type;
    el.style.display = "block";
    if (type === "success" || type === "info") {
      setTimeout(function () {
        el.style.display = "none";
      }, 5000);
    }
  }

  /** @param {string} s @return {string} */
  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  /** @return {Object|null} the selected template */
  function currentTemplate() {
    for (var i = 0; i < TEMPLATES.length; i++) {
      if (TEMPLATES[i].id === selectedId) return TEMPLATES[i];
    }
    return null;
  }

  /**
   * Parses the points textarea into [{title, desc}]. One point per line; title
   * and an optional description are separated by the first "|".
   * @return {Array<{title:string, desc:string}>}
   */
  function parsePoints() {
    var raw = document.getElementById("pointsInput").value || "";
    var lines = raw.split("\n");
    var points = [];
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (!line) continue;
      var idx = line.indexOf("|");
      var title;
      var desc;
      if (idx >= 0) {
        title = line.slice(0, idx).trim();
        desc = line.slice(idx + 1).trim();
      } else {
        title = line;
        desc = "";
      }
      if (title || desc) points.push({ title: title, desc: desc });
    }
    return points;
  }

  /** Renders the clickable template chips. */
  function renderChips() {
    var wrap = document.getElementById("templateChips");
    wrap.innerHTML = "";
    TEMPLATES.forEach(function (t) {
      var chip = document.createElement("button");
      chip.type = "button";
      chip.className = "tpl-chip" + (t.id === selectedId ? " active" : "");
      chip.innerHTML =
        '<span class="swatch" style="background:' +
        t.accent +
        '"></span>' +
        escapeHtml(t.name);
      chip.onclick = function () {
        selectTemplate(t.id);
      };
      wrap.appendChild(chip);
    });
  }

  /**
   * Selects a template and refreshes chips + preview.
   * @param {string} id
   */
  function selectTemplate(id) {
    selectedId = id;
    renderChips();
    updatePreview();
  }

  /** Re-renders the live HTML preview of the takeaways block. */
  function updatePreview() {
    var preview = document.getElementById("takeawaysPreview");
    var t = currentTemplate();
    if (!t) {
      preview.innerHTML =
        '<span class="placeholder">預覽會顯示在這裡…</span>';
      return;
    }
    var heading =
      document.getElementById("headingInput").value.trim() || DEFAULT_HEADING;
    var points = parsePoints();
    if (!points.length) {
      points = [{ title: "Your first takeaway", desc: "an optional description" }];
    }

    var html =
      '<div class="tp-heading" style="color:' +
      t.accent +
      '">' +
      escapeHtml(heading) +
      "</div>";

    if (t.style === "checklist") {
      html += '<div class="tp-list">';
      points.forEach(function (p) {
        html +=
          '<div class="tp-row">' +
          '<span class="tp-check" style="color:' +
          t.accent +
          '">✓</span>' +
          "<span>" +
          '<span class="tp-row-title" style="color:' +
          t.titleText +
          '">' +
          escapeHtml(p.title) +
          "</span>" +
          (p.desc
            ? '<div class="tp-row-desc" style="color:' +
              t.descText +
              '">' +
              escapeHtml(p.desc) +
              "</div>"
            : "") +
          "</span>" +
          "</div>";
      });
      html += "</div>";
    } else {
      var cols = points.length <= 1 ? 1 : points.length === 2 ? 2 : 3;
      html +=
        '<div class="tp-grid" style="grid-template-columns:repeat(' +
        cols +
        ',1fr)">';
      points.forEach(function (p, i) {
        html +=
          '<div class="tp-card" style="background:' +
          t.cardFill +
          ";border-color:" +
          t.cardBorder +
          '">' +
          '<span class="tp-badge" style="background:' +
          t.badgeFill +
          ";color:" +
          t.badgeText +
          '">' +
          (i + 1) +
          "</span>" +
          '<div class="tp-card-title" style="color:' +
          t.titleText +
          '">' +
          escapeHtml(p.title) +
          "</div>" +
          (p.desc
            ? '<div class="tp-card-desc" style="color:' +
              t.descText +
              '">' +
              escapeHtml(p.desc) +
              "</div>"
            : "") +
          "</div>";
      });
      html += "</div>";
    }
    preview.innerHTML = html;
  }

  /**
   * Strips code-fence markers so the points parser sees clean lines even when an
   * LLM wraps its output in ```.
   * @param {string} text
   * @return {string}
   */
  function cleanPointsText(text) {
    return (text || "")
      .split(/\r?\n/)
      .filter(function (l) {
        return !/^```/.test(l.trim());
      })
      .join("\n")
      .trim();
  }

  /**
   * Sends the Context textarea text to Groq, then writes the resulting takeaway
   * lines (`title | desc`) into the points textarea and refreshes the preview.
   * Does NOT overwrite the heading field.
   */
  function generateFromContext() {
    var ctx = document.getElementById("contextInput").value.trim();
    if (!ctx) {
      showStatus("貼上一段內容後再產生重點。", "error");
      return;
    }
    var btn = document.getElementById("generateButton");
    btn.disabled = true;
    btn.textContent = "Generating…";
    showStatus("🤖 AI 產生重點中…", "info");

    google.script.run
      .withSuccessHandler(function (res) {
        btn.disabled = false;
        btn.textContent = "✨ Generate with AI";
        if (res && res.needKey) {
          showStatus(res.error, "error");
          return;
        }
        if (!res || !res.success) {
          showStatus(
            "❌ " + ((res && res.error) || "AI generation failed."),
            "error",
          );
          return;
        }
        var text = cleanPointsText(res.generatedText || "");
        if (!text) {
          showStatus("❌ AI 沒有回傳重點，請換個說法再試。", "error");
          return;
        }
        document.getElementById("pointsInput").value = text;
        updatePreview();
        showStatus("✅ 已產生重點 — 檢視後即可 Insert。", "success");
      })
      .withFailureHandler(function (err) {
        btn.disabled = false;
        btn.textContent = "✨ Generate with AI";
        showStatus("❌ " + (err.message || "AI error"), "error");
      })
      .generateTakeawaysFromContext(ctx);
  }

  /** Clears heading + points (keeps the selected template). */
  function clearForm() {
    document.getElementById("headingInput").value = "";
    document.getElementById("pointsInput").value = "";
    document.getElementById("statusMessage").style.display = "none";
    updatePreview();
  }

  /** Inserts the takeaways block via the server. */
  function insertTakeaways() {
    var t = currentTemplate();
    if (!t) {
      showStatus("Pick a template first.", "error");
      return;
    }
    var points = parsePoints();
    if (!points.length) {
      showStatus("Add at least one takeaway point.", "error");
      return;
    }
    var btn = document.getElementById("insertButton");
    var label = btn.textContent;
    btn.disabled = true;
    btn.textContent = "Working…";
    showStatus("📌 Inserting takeaways…", "info");

    google.script.run
      .withSuccessHandler(function (res) {
        btn.disabled = false;
        btn.textContent = label;
        if (res && res.success) {
          google.script.host.close();
        } else {
          showStatus("❌ " + ((res && res.error) || "Insert failed."), "error");
        }
      })
      .withFailureHandler(function (err) {
        btn.disabled = false;
        btn.textContent = label;
        showStatus("❌ " + (err.message || "Insert error"), "error");
      })
      .insertTakeawaysIntoSlide({
        heading: document.getElementById("headingInput").value,
        points: points,
        templateId: selectedId,
      });
  }

  document.addEventListener("DOMContentLoaded", function () {
    document
      .getElementById("headingInput")
      .addEventListener("input", updatePreview);
    document
      .getElementById("pointsInput")
      .addEventListener("input", updatePreview);

    var __pre = window.__MINTER_PRELOAD__ || {};
    if (__pre.templates && __pre.templates.length) {
      TEMPLATES = __pre.templates;
      selectTemplate(TEMPLATES[0].id);
    } else {
      google.script.run
        .withSuccessHandler(function (templates) {
          TEMPLATES = templates || [];
          if (TEMPLATES.length) selectTemplate(TEMPLATES[0].id);
        })
        .withFailureHandler(function (err) {
          showStatus(
            "❌ Could not load templates: " + (err.message || ""),
            "error",
          );
        })
        .getTakeawaysTemplates();
    }

    showStatus("💡 填標題與重點 → 選範本 → Insert。", "info");
  });
</script>
